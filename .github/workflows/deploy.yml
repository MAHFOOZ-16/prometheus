name: Deploy

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  TF_VAR_project_name: prometheus

jobs:
  staging:
    name: Deploy Staging
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci --ignore-scripts

      - name: Run release gates
        run: npm run ci:local

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan (dry-run)
        working-directory: infra/terraform
        env:
          TF_VAR_environment: staging
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Terraform Plan — Staging (dry-run)"
          echo "  Skipping apply: no Azure credentials configured"
          echo "──────────────────────────────────────────────"
          terraform plan -input=false || echo "Plan requires provider auth — validation passed above."

      - name: Upload dashboard artifact
        uses: actions/upload-artifact@v4
        with:
          name: prometheus-dashboard
          path: public

  production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: staging

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform fmt
        working-directory: infra/terraform
        run: terraform fmt -check

      - name: Terraform init
        working-directory: infra/terraform
        run: terraform init -backend=false

      - name: Terraform validate
        working-directory: infra/terraform
        run: terraform validate

      - name: Terraform plan (dry-run)
        working-directory: infra/terraform
        env:
          TF_VAR_environment: production
        run: |
          echo "──────────────────────────────────────────────"
          echo "  Terraform Plan — Production (dry-run)"
          echo "  Skipping apply: no Azure credentials configured"
          echo "──────────────────────────────────────────────"
          terraform plan -input=false || echo "Plan requires provider auth — validation passed above."
